<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="page">

    <div class="back">
        ‹
    </div>

    <div class="header">
        Create Account
    </div>

    <div class="content">

        <h1>
            Welcome to MindSpace.
        </h1>

        <p>
            Let's set up your private space.
        </p>

        <form>
            <label>
                DISPLAY NAME
            </label>

            <input 
            type="text"
            placeholder="What should we call you?">

            <label>
                EMAIL
            </label>

            <input 
            type="email"
            placeholder="you@email.com">

            <label>
                PASSWORD
            </label>

            <input 
            type="password"
            placeholder="••••••••">

            <label>
                AGE GROUP
            </label>

            <select>

                <option>
                    13–17 ▼
                </option>

                <option>
                    18–25
                </option>

                <option>
                    26+
                </option>

            </select>


            <div class="checkbox">

                <input type="checkbox">

                <span>
                I agree to the privacy & safety terms
                </span>

            </div>

            <button>
                Create my space
            </button>

        </form>

    </div>

</div>

</body>
</html>
